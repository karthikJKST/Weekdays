services:
  - type: web
    name: weekdays-api
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/weekdays
    branch: main
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      # DATABASE_URL must be set manually in the Render dashboard.
      # Use your Neon JDBC connection string:
      #   jdbc:postgresql://ep-xxxx.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: DATABASE_URL
        sync: false
      # For Neon: use your Neon database user and password.
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      # Generate with: openssl rand -base64 64
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_TOKEN_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_DAYS
        value: "14"
      # Set to your Vercel frontend URL (e.g., https://weekdays.vercel.app)
      - key: CORS_ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: "8080"
