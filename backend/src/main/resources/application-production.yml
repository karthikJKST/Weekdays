spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/weekdays?sslmode=require}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 600000
      validation-timeout: 5000
      leak-detection-threshold: 60000

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain,text/css,text/javascript
    min-response-size: 1024
